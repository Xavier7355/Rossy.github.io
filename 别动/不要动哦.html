<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千万别动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial Black', 'Microsoft YaHei', sans-serif;
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            cursor: default;
        }
        
        .screen {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            transition: background-color 0.1s;
        }
        
        .warning-text {
            color: #fff;
            font-size: 5vw;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            letter-spacing: 5px;
            z-index: 10;
            position: relative;
            transition: opacity 0.3s;
        }
        
        /* 闪烁效果 */
        .flash-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 0.05s;
            z-index: 5;
        }
        
        /* 图片容器 - 替换图片的位置 */
        .image-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            z-index: 1;
        }
        
        /* 图片提示框 */
        .image-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            max-width: 300px;
            z-index: 20;
            border-left: 4px solid #ff0000;
        }
        
        .image-hint h3 {
            margin-bottom: 8px;
            color: #ff4d4d;
        }
        
        .image-hint code {
            background-color: #333;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
        
        /* 鼠标移动指示器 */
        .mouse-indicator {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #ff4d4d;
            font-size: 14px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 4px;
            z-index: 20;
            display: none;
        }
        
        /* 移动计数 */
        .move-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 18px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 4px;
            z-index: 20;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .warning-text {
                font-size: 8vw;
            }
            
            .image-hint {
                bottom: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <div class="screen" id="screen">
        <div class="warning-text">不 要 动 哦</div>
        <!-- 图片容器 - 替换图片的位置 -->
        <!-- 请将您的图片放在此div的背景中 -->
        <div class="image-container" id="imageContainer" style="background-image: url('./小红帽.jpg');"></div>
        <!-- 闪烁效果层 -->
        <div class="flash-effect" id="flashEffect"></div>
        。、
        <!-- 鼠标移动指示器 -->
        <div class="mouse-indicator" id="mouseIndicator">鼠标移动中...</div>
        
        <!-- 移动计数 -->
        <div class="move-counter" id="moveCounter">移动次数: 0</div>
        
        
    </div>

    <script>
        // 获取DOM元素
        const screen = document.getElementById('screen');
        const imageContainer = document.getElementById('imageContainer');
        const flashEffect = document.getElementById('flashEffect');
        const mouseIndicator = document.getElementById('mouseIndicator');
        const moveCounter = document.getElementById('moveCounter');
        let text = document.querySelector('.warning-text');
        
        // 变量初始化
        let moveCount = 0;
        let isMoving = false;
        let moveTimeout;
        let flashTimeout;
        
        // 更新移动计数显示
        function updateMoveCounter() {
            moveCount++;
            moveCounter.textContent = `移动次数: ${moveCount}`;
            
            // 每移动10次增加一次提示
            if (moveCount % 10 === 0) {
                moveCounter.style.backgroundColor = 'rgba(255, 0, 0, 0.7)';
                setTimeout(() => {
                    moveCounter.style.backgroundColor = 'rgba(0, 0, 0, 0.7)';
                }, 500);
            }
        }
        
        // 鼠标移动事件处理
        document.addEventListener('mousemove', function(e) {
            // 防止多次触发
            if (isMoving) return;
            isMoving = true;
            
            text.innerHTML = '    ';


            // 显示鼠标移动指示器
            mouseIndicator.style.display = 'block';

            
            
            
            // 更新移动计数
            updateMoveCounter();
            
            // 设置闪烁效果
            startFlashing();
            
            // 清除之前的超时
            clearTimeout(moveTimeout);
            clearTimeout(flashTimeout);
            
            // 设置停止移动检测
            moveTimeout = setTimeout(() => {

                isMoving = false;
                text.innerHTML = '千 万 别 动';
                mouseIndicator.style.display = 'none';
                stopFlashing();
            }, 100);
        });
        
        // 开始闪烁效果
        function startFlashing() {
            // 随机选择闪烁强度
            const flashIntensity = Math.random() * 0.7 + 0.3; // 0.3 到 1.0
            
            // 应用闪烁效果
            flashEffect.style.backgroundImage = imageContainer.style.backgroundImage;
            flashEffect.style.opacity = flashIntensity;
            
            // 随机闪烁颜色
            const red = Math.floor(Math.random() * 100);
            const green = Math.floor(Math.random() * 50);
            const blue = Math.floor(Math.random() * 50);
            flashEffect.style.backgroundColor = `rgba(${red}, ${green}, ${blue}, 0.2)`;
            
            // 随机闪烁位置偏移
            const offsetX = (Math.random() - 0.5) * 20;
            const offsetY = (Math.random() - 0.5) * 20;
            flashEffect.style.backgroundPosition = `calc(50% + ${offsetX}px) calc(50% + ${offsetY}px)`;
            
            // 随机闪烁大小
            const scale = 1 + Math.random() * 0.1;
            flashEffect.style.transform = `scale(${scale})`;
            
            // 设置下一次闪烁
            flashTimeout = setTimeout(() => {
                if (isMoving) {
                    startFlashing();
                }
            }, Math.random() * 100 + 50); // 50-150ms的随机间隔
        }
        
        // 停止闪烁效果
        function stopFlashing() {
            flashEffect.style.opacity = 0;
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', function() {
            // 初始提示
            setTimeout(() => {
                moveCounter.style.backgroundColor = 'rgba(255, 0, 0, 0.7)';
                setTimeout(() => {
                    moveCounter.style.backgroundColor = 'rgba(0, 0, 0, 0.7)';
                }, 1000);
            }, 1000);
        });
        
        // 添加键盘快捷键说明
        document.addEventListener('keydown', function(e) {
            // 按R键重置计数器
            if (e.key === 'r' || e.key === 'R') {
                moveCount = 0;
                moveCounter.textContent = `移动次数: ${moveCount}`;
                moveCounter.style.backgroundColor = 'rgba(0, 255, 0, 0.7)';
                setTimeout(() => {
                    moveCounter.style.backgroundColor = 'rgba(0, 0, 0, 0.7)';
                }, 1000);
            }
            
            // 按H键显示/隐藏提示框
            if (e.key === 'h' || e.key === 'H') {
                const hint = document.querySelector('.image-hint');
                hint.style.display = hint.style.display === 'none' ? 'block' : 'none';
            }
        });
        
        // 添加触摸设备支持
        document.addEventListener('touchmove', function(e) {
            // 防止默认滚动行为
            e.preventDefault();
            
            // 触发鼠标移动效果
            if (!isMoving) {
                const fakeEvent = new MouseEvent('mousemove', {
                    clientX: e.touches[0].clientX,
                    clientY: e.touches[0].clientY
                });
                document.dispatchEvent(fakeEvent);
            }
        }, { passive: false });
    </script>
</body>
</html>
